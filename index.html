<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เปรียบเทียบต้นทุน vs ราคาขาย</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; min-height: 100vh; padding: 2rem 1rem; }
h1 { font-size: 20px; font-weight: 700; color: #1a1a2e; text-align: center; margin-bottom: 1.5rem; }
.main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 960px; margin: 0 auto 1.5rem; }
.panel { background: #fff; border-radius: 14px; border: 1px solid #e5e7eb; overflow: hidden; }
.panel-header { padding: 12px 16px; font-size: 14px; font-weight: 700; letter-spacing: 0.03em; }
.panel-header.cost { background: #eff6ff; color: #1d4ed8; border-bottom: 2px solid #bfdbfe; }
.panel-header.sell { background: #f0fdf4; color: #15803d; border-bottom: 2px solid #bbf7d0; }
.panel-body { padding: 16px; }
.field-label { font-size: 12px; color: #9ca3af; margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
input[type="number"].price-input { width: 100%; font-size: 22px; font-weight: 700; border: none; border-bottom: 2px solid #e5e7eb; border-radius: 0; background: transparent; color: #111827; padding: 4px 0 6px; outline: none; margin-bottom: 14px; }
input[type="number"].price-input:focus { border-bottom-color: #6366f1; }
.discount-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.discount-row label { display: block; font-size: 11px; color: #9ca3af; margin-bottom: 4px; }
input[type="number"].d-input { width: 100%; padding: 7px 8px; font-size: 14px; border: 1px solid #e5e7eb; border-radius: 8px; background: #f9fafb; color: #111827; outline: none; }
input[type="number"].d-input:focus { border-color: #6366f1; background: #fff; }
.vat-row { display: flex; gap: 8px; margin-bottom: 14px; }
.vat-btn { flex: 1; padding: 8px; font-size: 13px; font-weight: 600; border: 1.5px solid #e5e7eb; border-radius: 8px; background: #f9fafb; color: #6b7280; cursor: pointer; transition: all 0.15s; }
.vat-btn.active-ex { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
.vat-btn.active-in { border-color: #f59e0b; background: #fffbeb; color: #b45309; }
.summary-box { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; }
.s-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
.s-row .sl { color: #6b7280; }
.s-row .sv { color: #111827; font-weight: 500; }
.s-row.s-disc .sv { color: #ef4444; }
.s-row.s-vat .sv { color: #f59e0b; }
.s-row.s-net { border-top: 1px solid #e5e7eb; margin-top: 6px; padding-top: 8px; font-size: 15px; }
.s-row.s-net .sl { font-weight: 700; color: #111827; }
.s-row.s-net .sv { font-weight: 700; font-size: 17px; }
.s-net-cost .sv { color: #1d4ed8; }
.s-net-sell .sv { color: #15803d; }
.compare-section { max-width: 960px; margin: 0 auto; background: #fff; border-radius: 14px; border: 1px solid #e5e7eb; overflow: hidden; }
.compare-header { background: #1a1a2e; color: #fff; padding: 12px 20px; font-size: 14px; font-weight: 700; }
.compare-body { padding: 20px; }
.compare-toggle { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; font-size: 13px; color: #6b7280; }
.toggle-btn { padding: 5px 14px; border-radius: 20px; border: 1.5px solid #e5e7eb; font-size: 12px; font-weight: 600; cursor: pointer; background: #f9fafb; color: #6b7280; transition: all 0.15s; }
.toggle-btn.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
.compare-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.metric-card { border-radius: 12px; padding: 14px; text-align: center; border: 1px solid #e5e7eb; }
.metric-card .m-label { font-size: 12px; color: #6b7280; margin-bottom: 6px; font-weight: 600; }
.metric-card .m-value { font-size: 20px; font-weight: 700; }
.metric-card.cost-card { background: #eff6ff; border-color: #bfdbfe; }
.metric-card.cost-card .m-value { color: #1d4ed8; }
.metric-card.sell-card { background: #f0fdf4; border-color: #bbf7d0; }
.metric-card.sell-card .m-value { color: #15803d; }
.metric-card.profit { background: #f0fdf4; border-color: #86efac; }
.metric-card.profit .m-value { color: #15803d; }
.metric-card.loss { background: #fef2f2; border-color: #fca5a5; }
.metric-card.loss .m-value { color: #dc2626; }
.metric-card.neutral { background: #f9fafb; border-color: #e5e7eb; }
.metric-card.neutral .m-value { color: #6b7280; }
.profit-bar-wrap { background: #f3f4f6; border-radius: 999px; height: 10px; overflow: hidden; margin: 12px 0 6px; }
.profit-bar { height: 100%; border-radius: 999px; transition: width 0.4s ease; }
.detail-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 4px; }
.detail-table th { text-align: left; padding: 8px 10px; background: #f9fafb; color: #6b7280; font-weight: 600; font-size: 12px; border-bottom: 1px solid #e5e7eb; }
.detail-table td { padding: 8px 10px; border-bottom: 1px solid #f3f4f6; color: #374151; }
.detail-table td.num { text-align: right; font-weight: 500; }
.detail-table td.red { color: #ef4444; text-align: right; font-weight: 500; }
.detail-table td.blue { color: #1d4ed8; text-align: right; font-weight: 500; }
.detail-table td.green { color: #15803d; text-align: right; font-weight: 500; }
.detail-table tr.total-row td { background: #f9fafb; font-weight: 700; font-size: 14px; border-top: 1.5px solid #e5e7eb; }
.note-box { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #92400e; margin-bottom: 14px; }
.empty-compare { text-align: center; padding: 2.5rem; color: #9ca3af; font-size: 14px; }
.reset-btn { display: block; width: 100%; max-width: 960px; margin: 1rem auto 0; padding: 10px; background: #f3f4f6; color: #6b7280; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 14px; cursor: pointer; }
.reset-btn:hover { background: #e5e7eb; color: #374151; }
@media (max-width: 600px) { .main-grid { grid-template-columns: 1fr; } .compare-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<h1>📊 เปรียบเทียบต้นทุน vs ราคาขาย</h1>

<div class="main-grid">
  <div class="panel">
    <div class="panel-header cost">💰 ต้นทุน (ซื้อเข้า)</div>
    <div class="panel-body">
      <div class="field-label">ราคาทุน (บาท)</div>
      <input type="number" class="price-input" id="c-price" placeholder="0.00" min="0" step="0.01" oninput="calc()">
      <div class="field-label">ส่วนลด (%)</div>
      <div class="discount-row">
        <div><label>ครั้งที่ 1</label><input type="number" class="d-input" id="c-d1" placeholder="0" min="0" max="100" step="0.01" oninput="calc()"></div>
        <div><label>ครั้งที่ 2</label><input type="number" class="d-input" id="c-d2" placeholder="0" min="0" max="100" step="0.01" oninput="calc()"></div>
        <div><label>ครั้งที่ 3</label><input type="number" class="d-input" id="c-d3" placeholder="0" min="0" max="100" step="0.01" oninput="calc()"></div>
      </div>
      <div class="field-label">VAT</div>
      <div class="vat-row">
        <button class="vat-btn active-ex" id="c-vex" onclick="setVat('c','ex')">VAT นอก (+7%)</button>
        <button class="vat-btn" id="c-vin" onclick="setVat('c','in')">VAT ใน (ถอย)</button>
      </div>
      <div class="summary-box" id="c-summary">
        <div class="s-row"><span class="sl">—</span><span class="sv">ใส่ราคาทุนเพื่อคำนวณ</span></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header sell">🏷️ ราคาขาย (ขายออก)</div>
    <div class="panel-body">
      <div class="field-label">ราคาขาย (บาท)</div>
      <input type="number" class="price-input" id="s-price" placeholder="0.00" min="0" step="0.01" oninput="calc()">
      <div class="field-label">ส่วนลด (%)</div>
      <div class="discount-row">
        <div><label>ครั้งที่ 1</label><input type="number" class="d-input" id="s-d1" placeholder="0" min="0" max="100" step="0.01" oninput="calc()"></div>
        <div><label>ครั้งที่ 2</label><input type="number" class="d-input" id="s-d2" placeholder="0" min="0" max="100" step="0.01" oninput="calc()"></div>
        <div><label>ครั้งที่ 3</label><input type="number" class="d-input" id="s-d3" placeholder="0" min="0" max="100" step="0.01" oninput="calc()"></div>
      </div>
      <div class="field-label">VAT</div>
      <div class="vat-row">
        <button class="vat-btn" id="s-vex" onclick="setVat('s','ex')">VAT นอก (+7%)</button>
        <button class="vat-btn active-in" id="s-vin" onclick="setVat('s','in')">VAT ใน (ถอย)</button>
      </div>
      <div class="summary-box" id="s-summary">
        <div class="s-row"><span class="sl">—</span><span class="sv">ใส่ราคาขายเพื่อคำนวณ</span></div>
      </div>
    </div>
  </div>
</div>

<div class="compare-section">
  <div class="compare-header">📈 ตารางเปรียบเทียบกำไร / ขาดทุน</div>
  <div class="compare-body">
    <div class="compare-toggle">
      <span>เปรียบเทียบโดยใช้ราคา:</span>
      <button class="toggle-btn active" id="btn-exvat" onclick="setCompareMode('exvat')">ก่อน VAT (ไม่รวม VAT)</button>
      <button class="toggle-btn" id="btn-incvat" onclick="setCompareMode('incvat')">หลัง VAT (รวม VAT)</button>
    </div>
    <div id="compare-content">
      <div class="empty-compare">ใส่ราคาทั้งสองฝั่งเพื่อดูผลเปรียบเทียบ</div>
    </div>
  </div>
</div>

<button class="reset-btn" onclick="resetAll()">↺ ล้างค่าทั้งหมด</button>

<script>
const vatState = { c: 'ex', s: 'in' };
let compareMode = 'exvat';

function fmt(n) {
  return n.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function setVat(side, mode) {
  vatState[side] = mode;
  ['ex','in'].forEach(m => {
    const btn = document.getElementById(side + '-v' + m);
    btn.className = 'vat-btn';
    if (m === mode) btn.classList.add(m === 'ex' ? 'active-ex' : 'active-in');
  });
  calc();
}

function setCompareMode(mode) {
  compareMode = mode;
  document.getElementById('btn-exvat').className = 'toggle-btn' + (mode === 'exvat' ? ' active' : '');
  document.getElementById('btn-incvat').className = 'toggle-btn' + (mode === 'incvat' ? ' active' : '');
  calc();
}

function computeSide(prefix) {
  const price = parseFloat(document.getElementById(prefix + '-price').value) || 0;
  const d1 = parseFloat(document.getElementById(prefix + '-d1').value) || 0;
  const d2 = parseFloat(document.getElementById(prefix + '-d2').value) || 0;
  const d3 = parseFloat(document.getElementById(prefix + '-d3').value) || 0;
  const vat = vatState[prefix];
  if (price <= 0) return null;

  let p = price;
  const discounts = [];
  [[d1,'1'],[d2,'2'],[d3,'3']].forEach(function(item) {
    const pct = item[0], label = item[1];
    if (pct > 0) {
      const amt = p * (pct / 100);
      p -= amt;
      discounts.push({ pct: pct, label: label, amt: amt, after: p });
    }
  });

  const afterDiscount = p;
  const totalDiscount = price - afterDiscount;
  let priceExVat, priceIncVat, vatAmt;

  if (vat === 'ex') {
    priceExVat = afterDiscount;
    vatAmt = afterDiscount * 0.07;
    priceIncVat = afterDiscount + vatAmt;
  } else {
    priceIncVat = afterDiscount;
    priceExVat = afterDiscount / 1.07;
    vatAmt = afterDiscount - priceExVat;
  }

  return { price: price, discounts: discounts, totalDiscount: totalDiscount, afterDiscount: afterDiscount, vat: vat, vatAmt: vatAmt, priceExVat: priceExVat, priceIncVat: priceIncVat };
}

function renderSummary(prefix, data) {
  const netClass = prefix === 'c' ? 's-net-cost' : 's-net-sell';
  if (!data) {
    document.getElementById(prefix + '-summary').innerHTML =
      '<div class="s-row"><span class="sl">—</span><span class="sv">ใส่ราคาเพื่อคำนวณ</span></div>';
    return;
  }
  let html = '<div class="s-row"><span class="sl">ราคาเริ่มต้น</span><span class="sv">' + fmt(data.price) + ' บาท</span></div>';
  data.discounts.forEach(function(d) {
    html += '<div class="s-row s-disc"><span class="sl">ส่วนลดครั้งที่ ' + d.label + ' (' + d.pct + '%)</span><span class="sv">- ' + fmt(d.amt) + ' บาท</span></div>';
  });
  if (data.totalDiscount > 0) {
    html += '<div class="s-row s-disc"><span class="sl">ส่วนลดรวม</span><span class="sv">- ' + fmt(data.totalDiscount) + ' บาท</span></div>';
  }
  if (data.vat === 'ex') {
    html += '<div class="s-row"><span class="sl">ราคาก่อน VAT</span><span class="sv">' + fmt(data.priceExVat) + ' บาท</span></div>';
    html += '<div class="s-row s-vat"><span class="sl">VAT 7% (นอก)</span><span class="sv">+ ' + fmt(data.vatAmt) + ' บาท</span></div>';
    html += '<div class="s-row s-net ' + netClass + '"><span class="sl">ราคารวม VAT</span><span class="sv">' + fmt(data.priceIncVat) + ' บาท</span></div>';
  } else {
    html += '<div class="s-row"><span class="sl">ราคารวม VAT</span><span class="sv">' + fmt(data.priceIncVat) + ' บาท</span></div>';
    html += '<div class="s-row s-vat"><span class="sl">VAT 7% (ใน)</span><span class="sv">' + fmt(data.vatAmt) + ' บาท</span></div>';
    html += '<div class="s-row s-net ' + netClass + '"><span class="sl">ราคาก่อน VAT</span><span class="sv">' + fmt(data.priceExVat) + ' บาท</span></div>';
  }
  document.getElementById(prefix + '-summary').innerHTML = html;
}

function calc() {
  const c = computeSide('c');
  const s = computeSide('s');
  renderSummary('c', c);
  renderSummary('s', s);

  const box = document.getElementById('compare-content');
  if (!c || !s) {
    box.innerHTML = '<div class="empty-compare">ใส่ราคาทั้งสองฝั่งเพื่อดูผลเปรียบเทียบ</div>';
    return;
  }

  const cCompare = compareMode === 'exvat' ? c.priceExVat : c.priceIncVat;
  const sCompare = compareMode === 'exvat' ? s.priceExVat : s.priceIncVat;
  const modeLabel = compareMode === 'exvat' ? 'ก่อน VAT' : 'รวม VAT';

  const profit = sCompare - cCompare;
  const profitPct = cCompare > 0 ? (profit / cCompare) * 100 : 0;
  const margin = sCompare > 0 ? (profit / sCompare) * 100 : 0;
  const barColor = profit > 0 ? '#22c55e' : profit === 0 ? '#9ca3af' : '#ef4444';
  const barWidth = Math.min(Math.abs(profitPct), 100);
  const resultClass = profit > 0 ? 'profit' : profit < 0 ? 'loss' : 'neutral';
  const resultLabel = profit > 0 ? '✅ กำไร' : profit < 0 ? '❌ ขาดทุน' : '➖ เท่าทุน';
  const diffSign = function(v) { return v >= 0 ? '+' : ''; };
  const diffClass = function(v) { return v >= 0 ? 'green' : 'red'; };

  box.innerHTML =
    '<div class="note-box">เปรียบเทียบโดยใช้ราคา<strong>' + modeLabel + '</strong> — ต้นทุน: <strong>' + fmt(cCompare) + ' บาท</strong> | ราคาขาย: <strong>' + fmt(sCompare) + ' บาท</strong></div>' +
    '<div class="compare-grid">' +
      '<div class="metric-card cost-card"><div class="m-label">ต้นทุน (' + modeLabel + ')</div><div class="m-value">' + fmt(cCompare) + '</div><div style="font-size:11px;color:#6b7280;margin-top:4px;">บาท</div></div>' +
      '<div class="metric-card sell-card"><div class="m-label">ราคาขาย (' + modeLabel + ')</div><div class="m-value">' + fmt(sCompare) + '</div><div style="font-size:11px;color:#6b7280;margin-top:4px;">บาท</div></div>' +
      '<div class="metric-card ' + resultClass + '"><div class="m-label">' + resultLabel + '</div><div class="m-value">' + diffSign(profit) + fmt(profit) + '</div><div style="font-size:11px;color:#6b7280;margin-top:4px;">บาท</div></div>' +
    '</div>' +
    '<div class="profit-bar-wrap"><div class="profit-bar" style="width:' + barWidth + '%;background:' + barColor + ';"></div></div>' +
    '<div style="display:flex;justify-content:space-between;font-size:12px;color:#6b7280;margin-bottom:16px;">' +
      '<span>กำไร/ขาดทุน: <strong style="color:' + barColor + '">' + diffSign(profit) + profitPct.toFixed(2) + '%</strong> จากต้นทุน</span>' +
      '<span>Gross Margin: <strong style="color:' + barColor + '">' + margin.toFixed(2) + '%</strong></span>' +
    '</div>' +
    '<table class="detail-table"><thead><tr><th>รายการ</th><th style="text-align:right">ต้นทุน (บาท)</th><th style="text-align:right">ราคาขาย (บาท)</th><th style="text-align:right">ผลต่าง (บาท)</th></tr></thead><tbody>' +
    '<tr><td>ราคาเริ่มต้น</td><td class="blue">' + fmt(c.price) + '</td><td class="green">' + fmt(s.price) + '</td><td class="' + diffClass(s.price-c.price) + '">' + diffSign(s.price-c.price) + fmt(s.price-c.price) + '</td></tr>' +
    '<tr><td>ส่วนลดรวม</td><td class="red">' + (c.totalDiscount > 0 ? '- ' + fmt(c.totalDiscount) : '—') + '</td><td class="red">' + (s.totalDiscount > 0 ? '- ' + fmt(s.totalDiscount) : '—') + '</td><td class="num">—</td></tr>' +
    '<tr><td>ราคาก่อน VAT</td><td class="blue">' + fmt(c.priceExVat) + '</td><td class="green">' + fmt(s.priceExVat) + '</td><td class="' + diffClass(s.priceExVat-c.priceExVat) + '">' + diffSign(s.priceExVat-c.priceExVat) + fmt(s.priceExVat-c.priceExVat) + '</td></tr>' +
    '<tr><td>VAT 7%</td><td class="num">' + fmt(c.vatAmt) + '</td><td class="num">' + fmt(s.vatAmt) + '</td><td class="num">—</td></tr>' +
    '<tr><td>ราคารวม VAT</td><td class="blue">' + fmt(c.priceIncVat) + '</td><td class="green">' + fmt(s.priceIncVat) + '</td><td class="' + diffClass(s.priceIncVat-c.priceIncVat) + '">' + diffSign(s.priceIncVat-c.priceIncVat) + fmt(s.priceIncVat-c.priceIncVat) + '</td></tr>' +
    '<tr class="total-row"><td>กำไร/ขาดทุน (' + modeLabel + ')</td><td class="blue">' + fmt(cCompare) + '</td><td class="green">' + fmt(sCompare) + '</td><td class="' + diffClass(profit) + '" style="font-size:15px;">' + diffSign(profit) + fmt(profit) + '</td></tr>' +
    '</tbody></table>';
}

function resetAll() {
  ['c','s'].forEach(function(p) {
    document.getElementById(p + '-price').value = '';
    ['d1','d2','d3'].forEach(function(d) { document.getElementById(p + '-' + d).value = ''; });
  });
  setVat('c', 'ex');
  setVat('s', 'in');
  compareMode = 'exvat';
  document.getElementById('btn-exvat').className = 'toggle-btn active';
  document.getElementById('btn-incvat').className = 'toggle-btn';
  calc();
}
</script>
</body>
</html>
